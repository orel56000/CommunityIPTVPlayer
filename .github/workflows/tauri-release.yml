name: Build and Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Cancel a superseded run for the same ref (e.g. a re-pushed tag) so we don't
# burn macOS runner minutes finishing a build that's already stale.
concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (x64)
            artifacts: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - os: macos-latest
            label: macOS (Apple Silicon)
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-13
            label: macOS (Intel)
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            label: Linux (x64)
            artifacts: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri v2 system dependencies (WebKitGTK, tray, AppImage/deb/rpm tooling).
      # reqwest's default TLS needs libssl-dev on Linux.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Lint
        run: npm run lint

      # Decide whether this macOS build can be Developer ID signed + notarized.
      # It can only when the maintainer has added the Apple secrets below. The
      # printed value is just the boolean `true`/`false`, never the secrets.
      - name: Detect macOS signing secrets
        id: macsign
        if: runner.os == 'macOS'
        shell: bash
        run: echo "enabled=${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_CERTIFICATE != '' }}" >> "$GITHUB_OUTPUT"

      # macOS, signed + notarized. Tauri's bundler imports APPLE_CERTIFICATE (a
      # base64 .p12) into a throwaway keychain, signs the .app with
      # APPLE_SIGNING_IDENTITY, then notarizes + staples via the Apple ID creds —
      # producing a DMG that opens with NO Gatekeeper warning. Runs only when the
      # secrets are present so the default open-source build never breaks.
      - name: Build Tauri bundles (signed + notarized)
        if: runner.os == 'macOS' && steps.macsign.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build

      - name: Note unsigned macOS build
        if: runner.os == 'macOS' && steps.macsign.outputs.enabled != 'true'
        shell: bash
        run: |
          echo "::notice title=Unsigned macOS build::No Apple signing secrets configured, so this DMG is unsigned. It works, but after downloading users must clear quarantine once with: xattr -cr '/Applications/Community IPTV Player.app'. Add the APPLE_* repo secrets to enable notarization."

      # Windows, Linux, and the unsigned macOS fallback. Runs
      # scripts/prepare-tauri-sidecars.mjs (per-platform ffmpeg via ffmpeg-static)
      # then `tauri build`.
      - name: Build Tauri bundles
        if: runner.os != 'macOS' || steps.macsign.outputs.enabled != 'true'
        run: npm run tauri:build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          if-no-files-found: error
          path: ${{ matrix.artifacts }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ matrix.artifacts }}

name: Build and Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (x64)
            artifacts: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - os: macos-latest
            label: macOS (Apple Silicon)
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-13
            label: macOS (Intel)
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            label: Linux (x64)
            artifacts: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri v2 system dependencies (WebKitGTK, tray, AppImage/deb/rpm tooling).
      # reqwest's default TLS needs libssl-dev on Linux.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Lint
        run: npm run lint

      # Runs scripts/prepare-tauri-sidecars.mjs (per-platform ffmpeg via
      # ffmpeg-static) then `tauri build`.
      - name: Build Tauri bundles
        run: npm run tauri:build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          if-no-files-found: error
          path: ${{ matrix.artifacts }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ matrix.artifacts }}

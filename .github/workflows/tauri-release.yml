name: Build and Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows desktop build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Lint
        run: npm run lint

      - name: Build Tauri bundles
        run: npm run tauri:build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: community-iptv-player-windows
          if-no-files-found: error
          # Only the installers — the bare exe can't run standalone (it needs the
          # bundled dist/ffmpeg the installer lays down next to it).
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Publish only the installers, not the standalone exe.
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
